name: CI

on:
  push:
    branches: [main]
  pull_request:

# Отменяем устаревшие прогоны при новом пуше в ту же ветку.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "24.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Playwright ставится как npm-пакет, но браузеры не скачиваем:
      # тесты гоняют источники/пайплайн на фейках, живой Chromium не нужен.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build
